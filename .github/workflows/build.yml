name: Flutter APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reconstruct Android Folder and Build APK
        run: |
          # Bubuhayin nito ang nawawalang android folder sa repo mo nang ligtas
          flutter create . --overwrite --org com.renantefullo --project-name tidal_stream
          
          # Pagkatapos ay i-di-download ang packages at magbi-build
          flutter pub get
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TidalStream-RenanteFullo-APK
          path: build/app/outputs/flutter-apk/app-release.apk
